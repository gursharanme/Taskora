<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./src/favicon.png" type="image/x-icon" />
    <link rel="stylesheet" href="./output.css" />
    <title>All Tasks | Taskora</title>
  </head>
  <body>
    <div class="xl:grid xl:grid-cols-12 w-full min-h-screen">
      <aside
        id="sidebar"
        class="absolute top-0 left-0 w-[90%] md:w-1/2 xl:w-full xl:static xl:col-span-3 border-r border-black/10 h-screen z-999 px-3 py-5 md:px-4 md:py-6 hidden xl:block bg-white"
      >
        <div class="flex flex-col gap-5 h-full">
          <!-- logo and sidebar close button -->
          <div class="flex items-center justify-between px-3">
            <a href="/" class="flex items-center gap-2 flex-1">
              <div class="h-6 w-6 bg-blue-500 rounded-full"></div>
              <div role="heading 1" class="text-lg lg:text-xl font-bold">
                Taskora
              </div>
            </a>

            <!-- sidebar close button -->
            <button
              id="close-sidebar-mobile"
              class="bg-transparent hover:bg-black/10 transition-colors duration-200 ease-in-out p-2 rounded-full cursor-pointer xl:hidden"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18 18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>

          <!-- navigation links -->
          <nav id="sidebar-navigation"></nav>

          <!-- username -->
          <div id="sidebarUsername-container" class="mt-auto"></div>
        </div>
      </aside>
      <!-- sidebar -->

      <!-- right side -->
      <div class="xl:col-span-9 min-h-screen">
        <!-- top-bar -->
        <div
          class="flex items-center gap-2 w-full border-b border-black/10 px-3 py-5 md:px-4 md:py-6"
        >
          <!-- sidebar open button -->
          <button
            id="open-sidebar-mobile"
            class="bg-transparent hover:bg-black/10 transition-colors duration-200 ease-in-out p-2 rounded-full cursor-pointer xl:hidden"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"
              />
            </svg>
          </button>

          <div class="flex items-center justify-between gap-2 flex-1">
            <!-- search -->
            <form
              method="post"
              id="searchTasksForm"
              class="flex flex-1 max-w-md items-center gap-2 relative"
            >
              <input
                type="text"
                name="search"
                id="searchTerm"
                placeholder="Search for Tasks..."
                class="flex items-center gap-2 py-2 px-3 pl-8 md:pl-11 rounded-md transition-colors duration-200 ease-in-out bg-neutral-100 text-black border border-black/10 focus:border focus:border-blue-500 focus:outline-0 text-sm md:text-base w-full placeholder:text-neutral-500"
              />
              <button
              id="searchButton"
                class="absolute top-1/2 -translate-y-1/2 left-0 px-2 md:px-3"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-4 md:size-5 text-neutral-500"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
                  />
                </svg>
              </button>
            </form>

            <!-- create new -->
            <button
              id="open-createNewModal"
              class="flex items-center gap-2 py-2 px-3 rounded-md transition-colors duration-200 ease-in-out bg-blue-500 hover:bg-blue-600 text-white cursor-pointer font-semibold"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 4.5v15m7.5-7.5h-15"
                />
              </svg>
              <span class="text-base hidden sm:block">Add New</span>
            </button>
          </div>
        </div>


        <!-- add new modal -->
        <div
          id="add-new-modal"
          class="h-screen w-screen flex items-center justify-center bg-black/70 backdrop-blur-sm absolute inset-0 z-9999 hidden"
        >
          <!-- create new close button -->

          <div
            class="flex flex-col gap-3 items-center bg-white p-4 md:p-6 w-[95%] max-w-md rounded-lg"
          >
            <!-- form header -->
            <div
              class="flex items-center justify-between w-full border-b border-black/10 pb-2 mb-4"
            >
              <div class="text-lg font-bold">Create New Task</div>
              <button
                id="close-createNewModal"
                class="bg-transparent hover:bg-black/10 transition-colors duration-200 ease-in-out p-2 rounded-full cursor-pointer"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="1.5"
                  stroke="currentColor"
                  class="size-5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M6 18 18 6M6 6l12 12"
                  />
                </svg>
              </button>
            </div>

            <!-- create new Form -->
            <form action="" class="w-full flex flex-col gap-6">
              <!-- name -->
              <div class="flex flex-col gap-1.5 w-full">
                <label
                  for="taskName"
                  class="text-sm text-neutral-800 font-semibold"
                  >Name*</label
                >
                <input
                  type="text"
                  name="search"
                  id="taskName"
                  placeholder="Buy groceries"
                  class="flex items-center gap-2 py-2 px-3 rounded-md transition-colors duration-200 ease-in-out bg-neutral-100 text-black border border-blue-500/10 focus:border focus:border-blue-500 focus:outline-0 text-sm md:text-base w-full placeholder:text-neutral-500"
                  required
                />
              </div>

              <!-- Priority -->
              <div class="flex flex-col gap-1.5 w-full relative">
                <label
                  for="priority"
                  class="text-sm text-neutral-800 font-semibold"
                  >Priority*</label
                >
                <select
                  name="priority"
                  id="priority"
                  class="appearance-none flex items-center gap-2 py-2 px-3 rounded-md transition-colors duration-200 ease-in-out bg-neutral-100 text-neutral-500 border border-blue-500/10 focus:border focus:border-blue-500 focus:outline-0 text-sm md:text-base w-full placeholder:text-neutral-500"
                  required
                >
                  <option value="" selected>Select priority level</option>
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                </select>

                <button
                  class="pointer-events-none bg-transparent hover:bg-black/10 transition-colors duration-200 ease-in-out p-2 rounded-full cursor-pointer absolute bottom-1 right-2 text-neutral-500"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="size-4"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      d="m19.5 8.25-7.5 7.5-7.5-7.5"
                    />
                  </svg>
                </button>
              </div>

              <!-- Submit Button -->
              <button
                id="createNewTaskButton"
                class="flex items-center gap-2 py-2 px-3 rounded-md transition-colors duration-200 ease-in-out bg-blue-500 hover:bg-blue-600 text-white cursor-pointer font-semibold"
              >
                <span class="text-base uppercase text-center w-full"
                  >Add Now</span
                >
              </button>
            </form>
          </div>
        </div>

        <!-- main content -->
        <main class="px-3 py-5 md:px-4 md:py-6">
          <!-- top 10 tasks -->
          <div class="flex items-baseline justify-between mt-0 mb-4">
            <div class="text-xs lg:text-sm text-black/80 font-semibold">
              All Tasks
            </div>
            <div
              class="text-xs lg:text-sm text-black/80 hover:text-blue-500 transition-all duration-200 ease-in-out underline"
            >
              <a href="./index.html">dashboard</a>
            </div>
          </div>

          <!-- tasks -->
          <div class="w-full h-full">
            <ul id="taskListContainerAllTasks" class="flex flex-col gap-3"></ul>
          </div>
        </main>
      </div>
    </div>

    <script src="./sidebar.js"></script>
    <script src="./createNewModal.js"></script>
    <script src="./tasks.js"></script>
    <script src="./moreoptions.js"></script>
  </body>
</html>
